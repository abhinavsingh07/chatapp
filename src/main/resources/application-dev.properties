#Hikari pool settings
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.pool-name=MyHikariPool

#Caching
spring.cache.type=redis
#spring.redis.host=localhost #As redis running inside docker hmm need to check its working from localhost or not
#As we are using redis inside docker
spring.redis.host=host.docker.internal
spring.redis.port=6379
spring.redis.timeout=60000